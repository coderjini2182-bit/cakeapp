<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🎂 생일 케이크 메이커</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#e8547a">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="케이크메이커">
<link rel="apple-touch-icon" href="./icons/icon-192x192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-x:hidden;width:100%;max-width:100vw}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;background:#FFF5F7;min-height:100%;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:100vw}
.page{display:none;flex-direction:column;min-height:100vh;min-height:100dvh}.page.active{display:flex}
#page1{background:linear-gradient(180deg,#FFF5F7,#FFF0F4);padding:20px 16px 110px;gap:14px;max-width:100vw;overflow-x:hidden}
.app-title{font-family:'Pacifico',cursive;font-size:28px;text-align:center;color:#e8547a;text-shadow:0 2px 8px rgba(232,84,122,.15)}
.app-sub{text-align:center;font-size:14px;color:#999;font-weight:500;margin-bottom:2px}
.panel{background:#fff;border:1px solid #f0e0e6;border-radius:16px;padding:14px;box-shadow:0 2px 12px rgba(232,84,122,.06);overflow:hidden;min-width:0}
.panel-label{font-size:12px;font-weight:800;color:#e8547a;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.item-grid{display:grid;gap:6px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.sel-btn{border:2px solid #f0e0e6;border-radius:12px;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;background:#fafafa;transition:all .18s;overflow:hidden;min-width:0}
.sel-btn.active{border-color:#e8547a;background:#fff0f4;box-shadow:0 0 0 2px rgba(232,84,122,.2)}
.sel-btn img{width:100%;max-height:64px;object-fit:contain}
.sel-btn span{font-size:11px;color:#888;font-weight:700}.sel-btn.active span{color:#e8547a}
.bg-btn{height:52px;border-radius:10px;border:2.5px solid transparent;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .18s;background-size:cover;background-position:center}
.bg-btn.active{border-color:#e8547a;box-shadow:0 0 0 2px rgba(232,84,122,.3)}
.bg-btn span{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.candle-count-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.candle-count-row label{font-size:13px;color:#888;font-weight:700}
.count-ctrl{display:flex;align-items:center;gap:8px}
.count-ctrl button{width:34px;height:34px;border-radius:50%;border:1.5px solid #e0d0d6;background:#fafafa;cursor:pointer;font-size:18px;font-weight:700;color:#555;display:flex;align-items:center;justify-content:center}
.count-ctrl button:active{background:#e8547a;color:#fff;border-color:#e8547a}
.count-ctrl span{font-size:17px;font-weight:800;min-width:22px;text-align:center;color:#e8547a}
.msg-input{width:100%;border:1.5px solid #f0e0e6;border-radius:10px;padding:12px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;background:#fafafa;color:#333;outline:none;margin-bottom:10px;-webkit-appearance:none}
.msg-input:focus{border-color:#e8547a;background:#fff}
.font-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.font-btn{border:1.5px solid #e8d8de;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;background:#fafafa;color:#555;font-weight:500}
.font-btn.active{border-color:#e8547a;background:#fff0f4;color:#e8547a;font-weight:700}
.color-row{display:flex;align-items:center;gap:8px}.color-row label{font-size:13px;color:#888;white-space:nowrap;font-weight:600}
.color-dots{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.color-dot.active{border-color:#333;transform:scale(1.2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-row:not(:last-child){border-bottom:1px solid #f5eaee}
.toggle-label{display:flex;flex-direction:column;gap:2px}
.toggle-label .t-title{font-size:14px;font-weight:700;color:#444}
.toggle-label .t-desc{font-size:11px;color:#aaa;font-weight:500}
.toggle-switch{position:relative;width:48px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:28px;transition:.3s}
.toggle-slider:before{content:'';position:absolute;height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked+.toggle-slider{background:#e8547a}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px)}
/* Preset slots */
.preset-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.preset-slot{border:2px solid #f0e0e6;border-radius:10px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;background:#fafafa;transition:all .18s;min-height:52px;justify-content:center;position:relative}
.preset-slot.filled{border-color:#e8d8de;background:#fff}
.preset-slot .p-num{font-size:10px;color:#ccc;font-weight:800}
.preset-slot .p-emoji{font-size:18px}
.preset-slot .p-name{font-size:9px;color:#888;font-weight:600;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-slot .p-del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#e8547a;color:#fff;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.preset-slot.filled .p-del{display:flex}
.preset-save-btn{width:100%;padding:10px;border:1.5px dashed #e8547a;border-radius:10px;background:transparent;color:#e8547a;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Noto Sans KR',sans-serif}
.preset-save-btn:active{background:#fff0f4}
/* Page 2 */
.make-btn-wrap{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:rgba(255,245,247,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #f0e0e6;z-index:10}
.make-btn{width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#e8547a,#ff9ebc);color:#fff;font-size:18px;font-weight:800;font-family:'Pacifico',cursive;cursor:pointer;box-shadow:0 4px 20px rgba(232,84,122,.35)}
.make-btn:active{transform:scale(.97)}
#page2{position:relative;overflow:hidden;justify-content:center;align-items:center;max-width:100vw}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#fxCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:5;pointer-events:none}
.cake-wrap{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;padding:20px 0 0}
#mainCanvas{max-width:100%;max-height:70vh;max-height:70dvh;display:block}
.cake-btns{position:absolute;bottom:0;left:0;right:0;z-index:6;display:flex;gap:14px;justify-content:center;padding:20px 16px;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.cake-ctrl{border:none;border-radius:50px;padding:14px 28px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px rgba(0,0,0,.18)}.cake-ctrl:active{transform:scale(.95)}
.back-btn{position:absolute;top:max(14px,env(safe-area-inset-top));left:14px;z-index:10;background:rgba(255,255,255,.9);border:none;border-radius:50px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#555;backdrop-filter:blur(8px);box-shadow:0 2px 10px rgba(0,0,0,.1)}
.blow-btn{background:#4a90d9;color:#fff}.light-btn{background:#f9a825;color:#fff}
.mic-indicator{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;z-index:10;background:rgba(255,255,255,.9);border-radius:50px;padding:8px 14px;font-size:12px;font-weight:700;backdrop-filter:blur(8px);box-shadow:0 2px 10px rgba(0,0,0,.1);display:none;align-items:center;gap:6px}
.mic-dot{width:8px;height:8px;border-radius:50%;background:#e8547a;animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>
<div class="page active" id="page1">
  <div class="app-title">🎂 생일 케이크 메이커</div>
  <p class="app-sub">케이크와 초를 골라 나만의 케이크를 완성해요!</p>

  <!-- PRESETS -->
  <div class="panel">
    <div class="panel-label">⭐ 내 세팅</div>
    <div class="preset-grid" id="presetGrid"></div>
    <button class="preset-save-btn" id="presetSaveBtn">💾 현재 세팅 저장하기</button>
  </div>

  <div class="panel"><div class="panel-label">① 케이크</div><div class="item-grid grid-4" id="cakeGrid"></div></div>
  <div class="panel"><div class="panel-label">② 초 스타일</div><div class="item-grid grid-3" id="candleGrid"></div>
    <div class="candle-count-row"><label>개수</label><div class="count-ctrl"><button id="minusBtn">−</button><span id="countDisplay">3</span><button id="plusBtn">+</button></div></div>
  </div>
  <div class="panel"><div class="panel-label">③ 배경</div><div class="item-grid grid-4" id="bgGrid"></div></div>
  <div class="panel"><div class="panel-label">④ 생일 문구</div>
    <input class="msg-input" id="msgInput" type="text" maxlength="24" placeholder="예: 생일 축하해요! 🎉" value="생일 축하해요! 🎉"/>
    <div class="font-row" id="fontRow"></div>
    <div class="color-row"><label>색상</label><div class="color-dots" id="colorDots"></div></div>
  </div>
  <div class="panel">
    <div class="panel-label">⑤ 특수 효과</div>
    <div class="toggle-row"><div class="toggle-label"><span class="t-title">🌬️ 입으로 촛불 끄기</span><span class="t-desc">마이크로 바람을 감지해요</span></div><label class="toggle-switch"><input type="checkbox" id="blowToggle"><span class="toggle-slider"></span></label></div>
    <div class="toggle-row"><div class="toggle-label"><span class="t-title">🎆 폭죽 효과</span><span class="t-desc">촛불이 꺼지면 축하 폭죽!</span></div><label class="toggle-switch"><input type="checkbox" id="fwToggle" checked><span class="toggle-slider"></span></label></div>
  </div>
  <div class="make-btn-wrap"><button class="make-btn" id="makeBtn">🎂 케이크 만들기!</button></div>
</div>

<div class="page" id="page2">
  <button class="back-btn" id="backBtn">← 돌아가기</button>
  <div class="mic-indicator" id="micIndicator"><span class="mic-dot"></span> 마이크 감지중</div>
  <img id="bgCanvas" src="" alt="">
  <canvas id="fxCanvas"></canvas>
  <div class="cake-wrap"><canvas id="mainCanvas"></canvas></div>
  <div class="cake-btns">
    <button class="cake-ctrl blow-btn" id="blowBtn">💨 후~ 불 끄기</button>
    <button class="cake-ctrl light-btn" id="lightBtn">🔥 불 켜기</button>
  </div>
</div>

<script>
/*
  ╔═══════════════════════════════════════════════╗
  ║  IMAGE GUIDE - 이미지 교체 방법               ║
  ║                                               ║
  ║  케이크: img/cakes/이름.png (투명 배경 PNG)    ║
  ║  촛불:  img/candles/이름.png (투명 배경 PNG)   ║
  ║  배경:  img/backgrounds/이름.jpg              ║
  ║                                               ║
  ║  아래 데이터의 img 경로만 맞추면 자동 적용!    ║
  ╚═══════════════════════════════════════════════╝
*/

const cakes=[
  {name:'딸기',     img:'img/cakes/strawberry.png', emoji:'🍓'},
  {name:'초코',     img:'img/cakes/choco.png',      emoji:'🍫'},
  {name:'바닐라',   img:'img/cakes/vanilla.png',    emoji:'🍦'},
  {name:'블루베리', img:'img/cakes/blueberry.png',  emoji:'🫐'},
  {name:'녹차',     img:'img/cakes/greentea.png',   emoji:'🍵'},
  {name:'레드벨벳', img:'img/cakes/redvelvet.png',  emoji:'❤️'},
  {name:'오레오',   img:'img/cakes/oreo.png',       emoji:'🖤'},
  {name:'당근',     img:'img/cakes/carrot.png',     emoji:'🥕'},
];
const candleStyles=[
  {name:'줄무늬', img:'img/candles/stripe.png'},
  {name:'골드',   img:'img/candles/gold.png'},
  {name:'민트',   img:'img/candles/mint.png'},
  {name:'핑크',   img:'img/candles/pink.png'},
  {name:'보라',   img:'img/candles/purple.png'},
  {name:'무지개', img:'img/candles/rainbow.png'},
  {name:'하늘',   img:'img/candles/sky.png'},
  {name:'코랄',   img:'img/candles/coral.png'},
  {name:'네온',   img:'img/candles/neon.png'},
];
const bgPresets=[
  {name:'핑크',     img:'img/backgrounds/pink.jpg'},
  {name:'하늘',     img:'img/backgrounds/sky.jpg'},
  {name:'라벤더',   img:'img/backgrounds/lavender.jpg'},
  {name:'골드',     img:'img/backgrounds/gold.jpg'},
  {name:'민트',     img:'img/backgrounds/mint.jpg'},
  {name:'파티',     img:'img/backgrounds/party.jpg'},
  {name:'구름',     img:'img/backgrounds/cloud.jpg'},
  {name:'레인보우', img:'img/backgrounds/rainbow.jpg'},
  {name:'벚꽃',     img:'img/backgrounds/cherry.jpg'},
  {name:'우주',     img:'img/backgrounds/space.jpg'},
  {name:'오로라',   img:'img/backgrounds/aurora.jpg'},
  {name:'일몰',     img:'img/backgrounds/sunset.jpg'},
];
const fontFamilies=[
  {css:'Pacifico, cursive',label:'파치코'},
  {css:"'Noto Sans KR', sans-serif",label:'고딕'},
  {css:'Georgia, serif',label:'세리프'},
  {css:'monospace',label:'모노'},
];
const textColors=['#e8547a','#ffffff','#f9d71c','#4ecdc4','#9b59b6','#ff6b6b','#222222','#ff9ebc'];

let selCake=0,selCandle=0,candleCount=3,selBg=0,selFont=0,selColor='#e8547a';
let flameStates=[],animT=0,animId=null;
let cakeCache=null,cakeCacheKey='',logW=0,logH=0;
let blowEnabled=false,fwEnabled=true;
let prevAllLit=true;

/* Preload */
const imgCache={};
function preload(){
  [...cakes.map(c=>c.img),...candleStyles.map(c=>c.img),...bgPresets.map(b=>b.img)].forEach(src=>{
    const im=new Image();im.onload=()=>{imgCache[src]=im;};im.src=src;
  });
}
preload();

function initFlames(n){flameStates=Array.from({length:n},()=>({lit:true,flicker:Math.random()*6}));}
initFlames(candleCount);

/* ═══ FLAME ═══ */
function drawFlame(ctx,cx,y,lit,fl){
  if(!lit){ctx.save();ctx.globalAlpha=.18;ctx.strokeStyle='#aaa';ctx.lineWidth=1;const w=Math.sin(fl*.5)*3;ctx.beginPath();ctx.moveTo(cx,y);ctx.bezierCurveTo(cx+w,y-7,cx-w,y-14,cx+w*.5,y-20);ctx.stroke();ctx.restore();return;}
  const f=1+Math.sin(fl)*.15,sw=Math.sin(fl*.7)*2;ctx.save();
  const gl=ctx.createRadialGradient(cx+sw*.3,y-12*f,2,cx,y-8*f,18*f);gl.addColorStop(0,'rgba(255,200,50,.22)');gl.addColorStop(1,'rgba(255,150,0,0)');ctx.fillStyle=gl;ctx.beginPath();ctx.arc(cx+sw*.3,y-10*f,18*f,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,100,20,.82)';ctx.beginPath();ctx.moveTo(cx+sw,y-24*f);ctx.bezierCurveTo(cx+6*f+sw*.5,y-14*f,cx+8*f,y-4*f,cx,y);ctx.bezierCurveTo(cx-8*f,y-4*f,cx-6*f+sw*.5,y-14*f,cx+sw,y-24*f);ctx.fill();
  const mg=ctx.createLinearGradient(cx,y,cx,y-19*f);mg.addColorStop(0,'rgba(255,180,0,.95)');mg.addColorStop(1,'rgba(255,220,50,.9)');ctx.fillStyle=mg;ctx.beginPath();ctx.moveTo(cx+sw*.7,y-19*f);ctx.bezierCurveTo(cx+4.5*f+sw*.3,y-10*f,cx+5.5*f,y-3*f,cx,y-1);ctx.bezierCurveTo(cx-5.5*f,y-3*f,cx-4.5*f+sw*.3,y-10*f,cx+sw*.7,y-19*f);ctx.fill();
  const ig=ctx.createLinearGradient(cx,y,cx,y-12*f);ig.addColorStop(0,'rgba(255,255,200,1)');ig.addColorStop(.5,'rgba(255,255,255,.95)');ig.addColorStop(1,'rgba(255,240,100,.8)');ctx.fillStyle=ig;ctx.beginPath();ctx.moveTo(cx+sw*.3,y-12*f);ctx.bezierCurveTo(cx+2.5*f,y-6*f,cx+3*f,y-2,cx,y-1);ctx.bezierCurveTo(cx-3*f,y-2,cx-2.5*f,y-6*f,cx+sw*.3,y-12*f);ctx.fill();ctx.restore();
}

/* ═══ IMAGE-BASED CACHE ═══ */
function getCandlePositions(W,H){
  const cx=W/2,baseY=H-30,rx2=W*.28,lh1=H*.17,lh2=H*.15;
  const topY=baseY-lh1-lh2,n=candleCount,spr=rx2*.65,pos=[];
  for(let i=0;i<n;i++){let cx2,cy2;if(n===1){cx2=cx;cy2=topY;}else{const a=((i/n)*Math.PI*2)-Math.PI/2;cx2=cx+spr*Math.cos(a);cy2=topY+spr*.35*Math.sin(a);}pos.push({x:cx2,y:cy2});}
  return pos;
}

function buildCakeCache(W,H){
  const key=`${W}_${H}_${selCake}_${selCandle}_${candleCount}`;
  if(cakeCacheKey===key&&cakeCache)return;cakeCacheKey=key;
  const dpr=window.devicePixelRatio||1;
  const oc=document.createElement('canvas');oc.width=W*dpr;oc.height=H*dpr;
  const ctx=oc.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  const cx=W/2,baseY=H-30;
  // Cake image
  const ci=imgCache[cakes[selCake].img];
  if(ci){const cw=W*.85,ch=cw*(ci.height/ci.width);ctx.drawImage(ci,cx-cw/2,baseY-ch+10,cw,ch);}
  // Candle images (body only: crop out top 30% which is flame)
  const si=imgCache[candleStyles[selCandle].img];
  const pos=getCandlePositions(W,H);
  pos.forEach(p=>{
    if(si){const cH=52,cW=cH*(si.width/si.height);const srcTop=si.height*.3,srcH=si.height-srcTop;const dH=cH*.7,dW=cW;ctx.drawImage(si,0,srcTop,si.width,srcH,p.x-dW/2,p.y-dH,dW,dH);}
  });
  cakeCache=oc;
}

function drawFrame(){
  const canvas=document.getElementById('mainCanvas'),ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1,W=logW,H=logH;
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  if(cakeCache)ctx.drawImage(cakeCache,0,0,W*dpr,H*dpr,0,0,W,H);
  // Flames
  const pos=getCandlePositions(W,H);
  pos.forEach((p,i)=>{const wickY=p.y-52*.7-4;const fs=flameStates[i]||{lit:true,flicker:0};if(fs.lit){ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(p.x,wickY,1.5,0,Math.PI*2);ctx.fill();}drawFlame(ctx,p.x,wickY,fs.lit,fs.flicker+animT);});
  // Glow
  const cx=W/2,baseY=H-30,rx2=W*.28,lh1=H*.17,lh2=H*.15,topY=baseY-lh1-lh2;
  if(flameStates.some(f=>f.lit)){const gw=ctx.createRadialGradient(cx,topY-35,5,cx,topY-30,rx2*1.5);gw.addColorStop(0,'rgba(255,210,80,.12)');gw.addColorStop(1,'rgba(255,210,80,0)');ctx.fillStyle=gw;ctx.beginPath();ctx.ellipse(cx,topY-30,rx2*1.8,rx2,0,0,Math.PI*2);ctx.fill();}
  // Text
  const msg=document.getElementById('msgInput').value.trim();
  if(msg){const ff=fontFamilies[selFont].css,fs=msg.length>14?18:22;ctx.font=`700 ${fs}px ${ff}`;ctx.textAlign='center';const ty=36;ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=5;ctx.strokeText(msg,cx,ty);ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillText(msg,cx+1,ty+1.5);ctx.fillStyle=selColor;ctx.fillText(msg,cx,ty);}
}

/* ═══ MIC BLOW ═══ */
let audioCtx=null,micStream=null,analyser=null,micData=null,micActive=false,blowFrames=0;
async function startMic(){if(micActive)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});const src=audioCtx.createMediaStreamSource(micStream);analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=.3;src.connect(analyser);micData=new Uint8Array(analyser.frequencyBinCount);micActive=true;document.getElementById('micIndicator').style.display='flex';}catch(e){alert('마이크 권한이 필요해요!');document.getElementById('blowToggle').checked=false;blowEnabled=false;}}
function stopMic(){if(micStream){micStream.getTracks().forEach(t=>t.stop());}if(audioCtx)audioCtx.close();audioCtx=null;micStream=null;micActive=false;analyser=null;micData=null;blowFrames=0;document.getElementById('micIndicator').style.display='none';}
function checkBlow(){if(!micActive||!analyser)return;analyser.getByteFrequencyData(micData);let sum=0;for(let i=0;i<Math.min(20,micData.length);i++)sum+=micData[i];if(sum/20>140){blowFrames++;if(blowFrames>=8&&flameStates.some(f=>f.lit)){let d=0;flameStates.forEach(f=>{if(f.lit)setTimeout(()=>{f.lit=false;},d+=80);});blowFrames=0;}}else blowFrames=Math.max(0,blowFrames-1);}

/* ═══ FIREWORKS ═══ */
let fwParticles=[],fwActive=false,fwAnimId=null;
function launchFireworks(){if(fwActive)return;fwActive=true;const vw=window.innerWidth,vh=window.innerHeight;fwParticles=[];const cols=['#ff6b6b','#f9d71c','#4ecdc4','#9b59b6','#ff9ebc','#fff','#ff9a56','#39ff14'];for(let b=0;b<5;b++){const bx=vw*.15+Math.random()*vw*.7,by=vh*.1+Math.random()*vh*.35,delay=b*300,col=cols[Math.floor(Math.random()*cols.length)];for(let i=0;i<40;i++){const ang=(i/40)*Math.PI*2+Math.random()*.3,spd=2+Math.random()*5;fwParticles.push({x:bx,y:by,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,decay:.008+Math.random()*.012,size:2+Math.random()*3,col,delay,trail:[],spark:Math.random()>.7});}}
  playFwSound();
  const fc=document.getElementById('fxCanvas'),dpr=window.devicePixelRatio||1;fc.width=vw*dpr;fc.height=vh*dpr;fc.style.width=vw+'px';fc.style.height=vh+'px';const fctx=fc.getContext('2d');fctx.setTransform(dpr,0,0,dpr,0,0);const st=performance.now();
  function loop(){const el=performance.now()-st;fctx.clearRect(0,0,vw,vh);let alive=false;fwParticles.forEach(p=>{if(el<p.delay||p.life<=0)return;alive=true;p.life-=p.decay;p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.vx*=.99;p.trail.push({x:p.x,y:p.y,a:p.life});if(p.trail.length>6)p.trail.shift();p.trail.forEach((t,ti)=>{fctx.globalAlpha=t.a*.3*(ti/p.trail.length);fctx.fillStyle=p.col;fctx.beginPath();fctx.arc(t.x,t.y,p.size*.5,0,Math.PI*2);fctx.fill();});fctx.globalAlpha=p.life;fctx.fillStyle=p.col;fctx.beginPath();fctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);fctx.fill();if(p.spark&&p.life>.3){fctx.globalAlpha=p.life*.4;fctx.fillStyle='#fff';fctx.beginPath();fctx.arc(p.x,p.y,p.size*p.life*2,0,Math.PI*2);fctx.fill();}});fctx.globalAlpha=1;if(alive||el<2000)fwAnimId=requestAnimationFrame(loop);else{fctx.clearRect(0,0,vw,vh);fwActive=false;}}loop();
}
function playFwSound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[0,.3,.6,.9,1.2].forEach(dl=>{const t=ac.currentTime+dl;const buf=ac.createBuffer(1,ac.sampleRate*.15,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.08));const s=ac.createBufferSource();s.buffer=buf;const g=ac.createGain();g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);s.connect(g);g.connect(ac.destination);s.start(t);s.stop(t+.15);const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(800+Math.random()*2000,t);o.frequency.exponentialRampToValueAtTime(200,t+.3);const og=ac.createGain();og.gain.setValueAtTime(.08,t);og.gain.exponentialRampToValueAtTime(.001,t+.3);o.connect(og);og.connect(ac.destination);o.start(t);o.stop(t+.3);});}catch(e){}}
function checkCandleState(){const any=flameStates.some(f=>f.lit);if(prevAllLit&&!any&&fwEnabled)setTimeout(launchFireworks,400);prevAllLit=any;}

/* ═══ PRESETS (localStorage, max 10) ═══ */
const PRESET_KEY='cakemaker_presets';
function loadPresets(){try{return JSON.parse(localStorage.getItem(PRESET_KEY))||[];}catch(e){return[];}}
function savePresets(arr){localStorage.setItem(PRESET_KEY,JSON.stringify(arr));}
function getCurrentSetting(){return{cake:selCake,candle:selCandle,count:candleCount,bg:selBg,font:selFont,color:selColor,msg:document.getElementById('msgInput').value,blow:blowEnabled,fw:fwEnabled};}
function applySetting(s){
  selCake=s.cake||0;selCandle=s.candle||0;candleCount=s.count||3;selBg=s.bg||0;selFont=s.font||0;selColor=s.color||'#e8547a';
  document.getElementById('msgInput').value=s.msg||'생일 축하해요! 🎉';
  document.getElementById('countDisplay').textContent=candleCount;
  blowEnabled=!!s.blow;fwEnabled=s.fw!==false;
  document.getElementById('blowToggle').checked=blowEnabled;
  document.getElementById('fwToggle').checked=fwEnabled;
  initFlames(candleCount);buildAll();
}
function buildPresetGrid(){
  const g=document.getElementById('presetGrid');g.innerHTML='';
  const presets=loadPresets();
  for(let i=0;i<10;i++){
    const slot=document.createElement('div');slot.className='preset-slot'+(presets[i]?' filled':'');
    if(presets[i]){
      const p=presets[i];
      slot.innerHTML=`<span class="p-emoji">${cakes[p.cake]?.emoji||'🎂'}</span><span class="p-name">${p.label||'세팅 '+(i+1)}</span><span class="p-del" data-i="${i}">×</span>`;
      slot.onclick=(e)=>{if(e.target.classList.contains('p-del')){const arr=loadPresets();arr.splice(parseInt(e.target.dataset.i),1);savePresets(arr);buildPresetGrid();return;}applySetting(p);};
    }else{
      slot.innerHTML=`<span class="p-num">${i+1}</span><span class="p-name" style="color:#ddd">비어있음</span>`;
    }
    g.appendChild(slot);
  }
}
document.getElementById('presetSaveBtn').onclick=()=>{
  const presets=loadPresets();
  if(presets.length>=10){alert('최대 10개까지 저장할 수 있어요! 기존 세팅을 삭제해주세요.');return;}
  const label=prompt('세팅 이름을 입력하세요:','내 세팅 '+(presets.length+1));
  if(!label)return;
  const s=getCurrentSetting();s.label=label;
  presets.push(s);savePresets(presets);buildPresetGrid();
};

/* ═══ SETUP ═══ */
function setupCanvases(){
  const mc=document.getElementById('mainCanvas'),bg=document.getElementById('bgCanvas');
  const vw=window.innerWidth,vh=window.innerHeight,dpr=window.devicePixelRatio||1;
  // Background = <img> element now
  bg.src=bgPresets[selBg].img;bg.style.width=vw+'px';bg.style.height=vh+'px';
  const side=Math.min(vw,vh*.78);logW=Math.round(side);logH=Math.round(side*.88);
  mc.width=logW*dpr;mc.height=logH*dpr;mc.style.width=logW+'px';mc.style.height=logH+'px';
  cakeCacheKey='';buildCakeCache(logW,logH);
}
function goToPage2(){initFlames(candleCount);prevAllLit=true;document.getElementById('page1').classList.remove('active');document.getElementById('page2').classList.add('active');cakeCacheKey='';setupCanvases();if(blowEnabled)startMic();if(animId)cancelAnimationFrame(animId);(function loop(){animT+=.05;flameStates.forEach(f=>{if(f.lit)f.flicker+=.08+Math.random()*.04;});if(blowEnabled)checkBlow();checkCandleState();drawFrame();animId=requestAnimationFrame(loop);})();}
function goToPage1(){document.getElementById('page2').classList.remove('active');document.getElementById('page1').classList.add('active');if(animId){cancelAnimationFrame(animId);animId=null;}if(fwAnimId){cancelAnimationFrame(fwAnimId);fwAnimId=null;}stopMic();}
window.addEventListener('resize',()=>{if(document.getElementById('page2').classList.contains('active'))setupCanvases();});

/* ═══ BUILD UI ═══ */
function buildCakeGrid(){const g=document.getElementById('cakeGrid');g.innerHTML='';cakes.forEach((c,i)=>{const b=document.createElement('button');b.className='sel-btn'+(i===selCake?' active':'');const im=document.createElement('img');im.src=c.img;im.alt=c.name;b.appendChild(im);b.appendChild(Object.assign(document.createElement('span'),{textContent:c.name}));b.onclick=()=>{selCake=i;buildCakeGrid();};g.appendChild(b);});}
function buildCandleGrid(){const g=document.getElementById('candleGrid');g.innerHTML='';candleStyles.forEach((s,i)=>{const b=document.createElement('button');b.className='sel-btn'+(i===selCandle?' active':'');const im=document.createElement('img');im.src=s.img;im.alt=s.name;im.style.maxHeight='56px';b.appendChild(im);b.appendChild(Object.assign(document.createElement('span'),{textContent:s.name}));b.onclick=()=>{selCandle=i;buildCandleGrid();};g.appendChild(b);});}
function buildBgGrid(){const g=document.getElementById('bgGrid');g.innerHTML='';bgPresets.forEach((bg,i)=>{const b=document.createElement('button');b.className='bg-btn'+(i===selBg?' active':'');b.style.backgroundImage=`url(${bg.img})`;const sp=document.createElement('span');sp.textContent=bg.name;b.appendChild(sp);b.onclick=()=>{selBg=i;buildBgGrid();};g.appendChild(b);});}
function buildFontRow(){const g=document.getElementById('fontRow');g.innerHTML='';fontFamilies.forEach((f,i)=>{const b=document.createElement('button');b.className='font-btn'+(i===selFont?' active':'');b.style.fontFamily=f.css;b.textContent=f.label;b.onclick=()=>{selFont=i;buildFontRow();};g.appendChild(b);});}
function buildColorDots(){const g=document.getElementById('colorDots');g.innerHTML='';textColors.forEach(col=>{const d=document.createElement('div');d.className='color-dot'+(col===selColor?' active':'');d.style.background=col;if(col==='#ffffff')d.style.boxShadow='inset 0 0 0 1px #ccc';d.onclick=()=>{selColor=col;buildColorDots();};g.appendChild(d);});}
function buildAll(){buildCakeGrid();buildCandleGrid();buildBgGrid();buildFontRow();buildColorDots();buildPresetGrid();}

/* ═══ EVENTS ═══ */
document.getElementById('makeBtn').onclick=goToPage2;
document.getElementById('backBtn').onclick=goToPage1;
document.getElementById('blowBtn').onclick=()=>{flameStates.forEach(f=>f.lit=false);};
document.getElementById('lightBtn').onclick=()=>{flameStates.forEach(f=>f.lit=true);prevAllLit=true;};
document.getElementById('minusBtn').onclick=()=>{if(candleCount>1){candleCount--;document.getElementById('countDisplay').textContent=candleCount;initFlames(candleCount);}};
document.getElementById('plusBtn').onclick=()=>{if(candleCount<8){candleCount++;document.getElementById('countDisplay').textContent=candleCount;initFlames(candleCount);}};
document.getElementById('blowToggle').onchange=function(){blowEnabled=this.checked;if(blowEnabled&&document.getElementById('page2').classList.contains('active'))startMic();else if(!blowEnabled)stopMic();};
document.getElementById('fwToggle').onchange=function(){fwEnabled=this.checked;};

buildAll();

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(e=>console.log(e));});}
</script>
